server:
  port: 8080

# --- 더미 데이터 생성용 (로컬/개발) — global.seed.DummyDataSeedRunner 참고 ---
# 각각 true일 때만 해당 시드 실행(순서: users → user-devices → chat-rooms). 전부 true면 전체 파이프라인.
# 환경변수: APP_SEED_USERS_ENABLED, APP_SEED_USER_DEVICES_ENABLED, APP_SEED_CHAT_ROOMS_ENABLED (운영에서는 false 권장)
app:
  seed:
    users:
      enabled: ${APP_SEED_USERS_ENABLED:false}
    user-devices:
      enabled: ${APP_SEED_USER_DEVICES_ENABLED:false}
    chat-rooms:
      enabled: ${APP_SEED_CHAT_ROOMS_ENABLED:false}

# --- DB 수동 정리 (진단 리포트 DiagnosticReport 엔티티 제거 후, 테이블이 DB에 남아 있을 때) ---
# PostgreSQL 예시 — psql 또는 클라이언트에서 실행:
#   DROP TABLE IF EXISTS diagnostic_reports;
# (엔티티 삭제 후 ddl-auto: update 만으로는 테이블이 자동 삭제되지 않을 수 있음)

spring:
  application:
    name: backend-core

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

  output:
    ansi:
      enabled: ALWAYS

  config:
    import: optional:file:.env[.properties]
  datasource:
    # 🌟 수정됨: .env 파일에서 값을 가져옵니다.
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

  security:
    oauth2:
      client:
        registration:
          google:
            # 🌟 수정됨: .env 파일에서 값을 가져옵니다.
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            # 🌟 수정됨: .env 파일에서 값을 가져옵니다.
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  # 🌟 수정됨: .env 파일에서 값을 가져옵니다.
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

ai:
  backend:
    url: ${AI_BACKEND_URL:http://localhost:8000}
